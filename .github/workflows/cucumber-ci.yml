name: Cucumber BDD Tests - CI

on:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

# step 1 : descarga el repositorio
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

# step 2 : instala Java
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

# step 3 : descarga las dependencias del proyecto
      - name: Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

# step 4 : instalacion de Allure report
      - name: Install Allure Commandline
        run: |
          ALLURE_VERSION=2.43.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

# step 5 : verifica la version de allure
      - name: Check Allure version
        run: allure --version

# step 6 : ejecuta los tests de cucumber
      - name: Run Cucumber Tests
        run:  mvn clean verify -Dcucumber.filter.tags="@regression"

#step 7 : genera el reporte de allure
      - name: Generate Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

# step 8 : publica reportes de cucumber
      - name: upload cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            target/cucumber-reports
            target/cucumber-reports/cucumber.json
            target/cucumber-reports/cucumber.xml

# step 9 : publica el reporte de allure
      - name: Publish Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
